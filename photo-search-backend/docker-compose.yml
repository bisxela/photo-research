services:
  postgres:
    image: ankane/pgvector:latest
    container_name: photo-search-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-photo_search}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fish}
      POSTGRES_DB: ${POSTGRES_DB:-photo_search_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "${POSTGRES_EXPOSE_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-photo_search} -d ${POSTGRES_DB:-photo_search_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - photo-search-network

  minio:
    image: minio/minio:latest
    container_name: photo-search-minio
    command: server /data --console-address ":${MINIO_CONSOLE_PORT:-9001}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-fish123}
    volumes:
      - minio_data:/data
      - ./init-scripts/create-buckets.sh:/create-buckets.sh
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:${MINIO_CONSOLE_PORT:-9001}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - photo-search-network
  minio-init:
    image: minio/minio:latest
    container_name: photo-search-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command: -c "sleep 5 && /create-buckets.sh"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-fish123}
    volumes:
      - ./init-scripts/create-buckets.sh:/create-buckets.sh
    networks:
      - photo-search-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: photo-search-backend
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-photo_search}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-fish}
      - POSTGRES_DB=${POSTGRES_DB:-photo_search_db}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-fish123}
      - MINIO_HOST=${MINIO_HOST:-minio}
      - MINIO_PORT=${MINIO_PORT:-9000}
      - CLIP_MODEL_NAME=${CLIP_MODEL_NAME:-OFA-Sys/chinese-clip-vit-base-patch16}
      - CLIP_MODEL_PATH=${CLIP_MODEL_PATH:-/app/models/chinese-clip-vit-base-patch16}
      - BACKEND_HOST=${BACKEND_HOST:-0.0.0.0}
      - BACKEND_PORT=${BACKEND_PORT:-8000}
      - UPLOAD_DIR=${UPLOAD_DIR:-/app/data/uploads}
      - THUMBNAIL_SIZE=${THUMBNAIL_SIZE:-200}
      - MAX_FILE_SIZE=${MAX_FILE_SIZE:-10485760}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./app:/app/app
      - ./models:/app/models:ro
      - uploads_data:/app/data/uploads
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - photo-search-network
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
  uploads_data:
  models_data:

networks:
  photo-search-network:
    driver: bridge
